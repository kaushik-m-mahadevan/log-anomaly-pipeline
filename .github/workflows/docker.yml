name: Docker

on:
  push:
    branches: [ main ]

jobs:
  build-and-test:
    name: Build & Test (Java 21)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build and run all tests
        run: mvn verify --batch-mode --no-transfer-progress

  push-images:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: build-and-test

    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        include:
          - service: log-ingestion-service
            image: log-ingestion-service
          - service: anomaly-detector-service
            image: anomaly-detector-service
          - service: alert-service
            image: alert-service

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/log-anomaly-pipeline/${{ matrix.image }}
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.service }}/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
