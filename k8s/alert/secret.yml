# Store the Slack webhook URL as a Kubernetes Secret so it never appears
# in ConfigMaps, logs, or kubectl describe output.
#
# HOW TO CREATE (do not commit the real URL — this file is a template):
#
#   kubectl create secret generic alert-service-secrets \
#     --namespace=log-pipeline \
#     --from-literal=SLACK_WEBHOOK_URL=https://hooks.slack.com/services/YOUR/REAL/URL
#
# This file is kept as documentation only. The Deployment mounts the secret
# by name, so the above command is the only step needed to enable Slack alerts.
#
# To disable Slack, create the secret with an empty value:
#   kubectl create secret generic alert-service-secrets \
#     --namespace=log-pipeline \
#     --from-literal=SLACK_WEBHOOK_URL=""
apiVersion: v1
kind: Secret
metadata:
  name: alert-service-secrets
  namespace: log-pipeline
type: Opaque
stringData:
  SLACK_WEBHOOK_URL: ""   # override via kubectl — see instructions above
