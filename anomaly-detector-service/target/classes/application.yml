spring:
  application:
    name: anomaly-detector-service
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: detector-group
      auto-offset-reset: earliest
      enable-auto-commit: false
    retry:
      topic:
        enabled: true

kafka:
  topics:
    processed-logs: processed-logs
    anomaly-alerts: anomaly-alerts

detector:
  window-size: ${DETECTOR_WINDOW_SIZE:5}
  error-rate-threshold: ${DETECTOR_ERROR_RATE_THRESHOLD:0.4}

server:
  port: 8081

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.logpipeline: INFO
    org.apache.kafka: WARN
