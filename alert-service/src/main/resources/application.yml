spring:
  application:
    name: alert-service
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: alert-group
      auto-offset-reset: earliest
      enable-auto-commit: false
  # Item 3: graceful shutdown — finish processing in-flight alerts before JVM exits
  lifecycle:
    timeout-per-shutdown-phase: 30s

server:
  port: 8082
  # Item 3: drain in-progress requests on SIGTERM
  shutdown: graceful

kafka:
  topics:
    anomaly-alerts: anomaly-alerts

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true

slack:
  # Set SLACK_WEBHOOK_URL env var (or override here) to enable Slack alerts.
  # Leave blank/unset to disable — SlackAlertChannel will not be registered.
  webhook-url: ${SLACK_WEBHOOK_URL:}

logging:
  level:
    com.logpipeline: INFO
    org.apache.kafka: WARN
